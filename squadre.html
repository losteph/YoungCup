<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squadre Torneo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
     <header>
        <div class="container header-content">
            <a href="index.html">
            <img src="img/logo.jpeg" alt="CY-LEAGUE Logo" class="logo-img">
            </a>
        </div>
        <nav>
                <a href="index.html">Classifica</a>
                <a href="partite.html">Partite</a>
                <a href="marcatori.html">Marcatori</a>
                <a href="squadre.html">Squadre</a>
                <a href="fantacalcio.html">Fantacalcio</a>
        </nav>
    </header>

    <main class="container">
        <h2>Le Squadre</h2>
        
        <div id="elenco-squadre">
            <p>Caricamento squadre...</p>
        </div>
    </main>

    <script src="js/squadre.js"></script>

    <div id="player-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center;" onclick="this.style.display='none'">
    
    <div style="width:300px; background:white; padding:15px; border-radius:5px; position:relative;" onclick="event.stopPropagation()">
        
        <div style="position:relative; border:2px solid #333; aspect-ratio:3/4; overflow:hidden; background:#eee;">
            <img id="modal-logo" src="" style="position:absolute; top:10px; left:10px; width:45px; height:45px; z-index:2;">
            <div id="modal-number" class="card-number-jersey"></div>
            <img id="modal-img" src="" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <div style="text-align:center; margin-top:15px; background:#222; color:white; padding:10px;">
            <div id="modal-name" style="font-size:1.2rem; font-weight:bold; text-transform:uppercase;"></div>
            <div id="modal-nickname" style="font-size:0.9rem; color:#ffd700; font-style:italic;"></div>
            <div id="modal-team" style="font-size:0.7rem; color:#ccc; margin-top:5px;"></div>
        </div>

    </div>
</div>
</body>
</html>
